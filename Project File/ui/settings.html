<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengaturan</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f5f5f5;
            color: #333;
            margin: 0;
            padding: 20px;
            user-select: none;
        }
        .container {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 400px;
            margin: 0 auto;
        }
        h2 {
            margin-top: 0;
            border-bottom: 2px solid #eee;
            padding-bottom: 15px;
            margin-bottom: 20px;
            color: #444;
        }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9em; }
        input[type="text"], select {
            width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 14px;
        }
        .buttons { display: flex; justify-content: flex-end; gap: 10px; margin-top: 30px; padding-top: 20px; border-top: 1px solid #eee; }
        button { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
        .btn-save { background-color: #3b82f6; color: white; }
        .btn-save:hover { background-color: #2563eb; }
        .btn-cancel { background-color: #e2e6ea; color: #495057; }
        .btn-cancel:hover { background-color: #dbe2e8; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Pengaturan</h2>
        
        <div class="form-group">
            <label for="username">Nama Pengguna</label>
            <input type="text" id="username" placeholder="Masukkan nama Anda">
        </div>

        <div class="form-group">
            <label for="theme">Tema Aplikasi</label>
            <select id="theme">
                <option value="light">Terang (Light)</option>
                <option value="dark">Gelap (Dark)</option>
            </select>
        </div>

        <div class="buttons">
            <button class="btn-cancel" id="btnCancel">Tutup</button>
            <button class="btn-save" id="btnSave">Simpan</button>
        </div>
    </div>

    <script>
        const { ipcRenderer } = require('electron');

        // Load settings saat window dibuka
        async function loadSettings() {
            const data = await ipcRenderer.invoke('data:load');
            if (data) {
                if (data.username) document.getElementById('username').value = data.username;
                if (data.theme) document.getElementById('theme').value = data.theme;
            }
        }

        // Simpan Pengaturan
        document.getElementById('btnSave').addEventListener('click', async () => {
            // Ambil data lama dulu agar library/history tidak tertimpa/hilang
            const currentData = await ipcRenderer.invoke('data:load') || {};
            
            const newSettings = {
                username: document.getElementById('username').value,
                theme: document.getElementById('theme').value
            };
            
            // Gabungkan data lama dengan setting baru
            const finalData = { ...currentData, ...newSettings };
            
            const success = await ipcRenderer.invoke('data:save', finalData);
            if (success) {
                alert('Pengaturan berhasil disimpan! Silakan restart aplikasi untuk melihat perubahan.');
                window.close();
            } else {
                alert('Gagal menyimpan pengaturan.');
            }
        });

        document.getElementById('btnCancel').addEventListener('click', () => window.close());

        loadSettings();
    </script>
</body>
</html>
