<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>My Pembaca Dokumen</title>

<style>
/* ===== RESET ===== */
html, body {
  margin: 0;
  padding: 0;
  background-color: #000;
  color: #fff;
  font-family: Arial, sans-serif;
  overflow-x: hidden;
}

/* ===== HEADER ===== */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 12px;
  border-bottom: 1px solid #222;
}

header h1 {
  margin: 0;
  font-size: 1.3rem;
  font-weight: normal;
}

.icon-group {
  display: flex;
  align-items: center;
  gap: 18px;
}

/* svg icon */
.icon-group svg {
  width: 20px;
  height: 20px;
  cursor: pointer;
}

/* tombol titik tiga (TEXT) */
.more-btn {
  font-size: 22px;
  line-height: 1;
  cursor: pointer;
  user-select: none;
  padding: 2px 4px;
}

.more-btn:hover {
  opacity: 0.8;
}

/* ===== MAIN ===== */
main {
  padding: 12px 12px 90px;
}

.library-title {
  font-size: 1rem;
  margin-bottom: 10px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
  gap: 10px;
}

.card {
  background-color: #222;
  border-radius: 6px;
  overflow: hidden;
  position: relative;
  cursor: pointer;
  transition: transform 0.2s ease;
}

.card:hover {
  transform: scale(1.04);
}

.card img {
  width: 100%;
  height: 150px;
  object-fit: cover;
  display: block;
}

.badge {
  position: absolute;
  top: 6px;
  left: 6px;
  background-color: rgba(100,100,255,0.75);
  font-size: 12px;
  padding: 2px 6px;
  border-radius: 4px;
  font-weight: bold;
}

.card-title {
  padding: 6px;
  font-size: 0.82rem;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ===== BOTTOM NAV ===== */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 64px;
  background-color: #111;
  border-top: 1px solid #333;
  display: flex;
  z-index: 10;
}

.nav-item {
  flex: 1;
  color: #999;
  font-size: 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

.nav-item svg {
  width: 24px;
  height: 24px;
  fill: currentColor;
  margin-bottom: 2px;
}

.nav-item.active {
  color: #fff;
}

.nav-item.active::before {
  content: "";
  position: absolute;
  width: 64px;
  height: 40px;
  background-color: rgba(100,100,255,0.35);
  border-radius: 20px;
  z-index: -1;
}
</style>
</head>

<body>

<!-- HEADER -->
<header>
  <h1>My Pembaca Dokumen</h1>

  <div class="icon-group">
    <!-- Search -->
    <svg viewBox="0 0 24 24">
      <path d="M21 21l-6-6m2-5a7 7 0 1 1-14 0 7 7 0 0 1 14 0z"
        stroke="white" stroke-width="2" fill="none"/>
    </svg>

    <!-- Garis tiga (HAMBURGER) -->
    <svg viewBox="0 0 24 24">
      <path d="M3 6h18M3 12h12M3 18h6"
        stroke="white" stroke-width="2" fill="none"/>
    </svg>

    <!-- Titik tiga -->
    <div class="more-btn">⋮</div>
  </div>
</header>

<main>
  <div class="library-title">Pustaka</div>

  <div class="grid">
    <div class="card">
      <img src="https://i.ibb.co/MfFWgzs/villainess-miss-demon-lord.jpg">
      <div class="card-title">The Villainess and Miss Demon Lord</div>
    </div>

    <div class="card">
      <div class="badge">27</div>
      <img src="https://i.ibb.co/f8nmKbJ/weile-fuhuo.jpg">
      <div class="card-title">Weile Fuhuo Anlian De Shi Zun...</div>
    </div>

    <div class="card">
      <div class="badge">24</div>
      <img src="https://i.ibb.co/y0JXjJ7/green-plum-blossom-tea.jpg">
      <div class="card-title">Green Plum Blossom Tea</div>
    </div>

    <div class="card">
      <img src="https://i.ibb.co/qpr9xQ9/weixian-xintiao.jpg">
      <div class="card-title">Wéixiǎn Xīntiǎo</div>
    </div>
  </div>
</main>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <div class="nav-item active">
    <svg viewBox="0 0 24 24">
      <path d="M4 19h16v-6H4v6zm0-8h16V5H4v6z"/>
    </svg>
    <span>Pustaka</span>
  </div>

  <div class="nav-item">
    <svg viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2"/>
    </svg>
    <span>Riwayat</span>
  </div>
</nav>

</body>
</html>
