name: Bug Report
description: Create a report to help us improve KeiYomi
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: I clicked on X and Y happened...
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: To Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Open KeiYomi
        2. Go to '...'
        3. Click on '....'
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      description: What OS are you running KeiYomi on?
      options:
        - Windows 10
        - Windows 11
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App Version
      description: Which version of KeiYomi are you using? (e.g., v1.0.0)
      placeholder: v1.0.0
    validations:
      required: true
  - type: dropdown
    id: file_type
    attributes:
      label: File Format (if applicable)
      description: What type of file were you trying to read?
      options:
        - PDF
        - CBZ
        - ZIP
        - TXT
        - Not applicable
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: Paste any error logs from Developer Tools (Ctrl+Shift+I) or drag and drop screenshots here.
    validations:
      required: false